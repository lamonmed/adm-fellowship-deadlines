<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADM Fellowship — ACGME Deadline Dashboard</title>
<style>
  :root {
    --blue-dark: #1F4E79; --blue-mid: #2E75B6; --blue-light: #EBF3FB;
    --green: #0F6E56; --green-light: #E1F5EE; --purple: #534AB7; --purple-light: #EEEDFE;
    --amber: #854F0B; --amber-light: #FAEEDA; --red: #A32D2D; --red-light: #FCEBEB;
    --teal: #0F6E56; --teal-light: #E1F5EE; --gray: #5F5E5A; --gray-light: #F1EFE8;
    --bg: #F7F9FC; --surface: #FFFFFF; --border: #E0E7EF; --text: #1A1A2E; --text-muted: #6B7280;
    --radius: 8px; --radius-lg: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .topbar { background: var(--blue-dark); color: #fff; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.18); }
  .topbar-title { font-size: 16px; font-weight: 600; }
  .topbar-sub { font-size: 12px; opacity: 0.7; margin-top: 2px; }
  .role-selector { display: flex; align-items: center; gap: 10px; }
  .role-selector label { font-size: 13px; opacity: 0.85; }
  .role-selector select { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 5px 10px; border-radius: var(--radius); font-size: 13px; cursor: pointer; }
  .role-selector select option { background: var(--blue-dark); color: #fff; }
  .main { max-width: 1100px; margin: 0 auto; padding: 24px 16px 48px; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; }
  .stat-label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
  .stat-num { font-size: 26px; font-weight: 600; color: var(--blue-dark); }
  .stat-num.green { color: var(--green); } .stat-num.amber { color: var(--amber); } .stat-num.red { color: var(--red); }
  .filters { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; align-items: center; }
  .filter-label { font-size: 13px; color: var(--text-muted); margin-right: 4px; }
  .filter-btn { padding: 5px 14px; border-radius: 99px; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); font-size: 13px; cursor: pointer; }
  .filter-btn:hover { border-color: var(--blue-mid); color: var(--blue-dark); }
  .filter-btn.active { background: var(--blue-dark); color: #fff; border-color: var(--blue-dark); font-weight: 500; }
  .section-header { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin: 20px 0 8px; padding-left: 4px; }
  .deadline-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; margin-bottom: 8px; display: flex; gap: 14px; align-items: flex-start; }
  .deadline-card:hover { box-shadow: 0 2px 10px rgba(31,78,121,0.08); }
  .deadline-card.completed { opacity: 0.55; } .deadline-card.completed .dl-task { text-decoration: line-through; }
  .dl-check-col { flex-shrink: 0; padding-top: 2px; }
  .dl-checkbox { width: 20px; height: 20px; border-radius: 5px; border: 2px solid var(--border); appearance: none; cursor: pointer; position: relative; }
  .dl-checkbox:checked { background: var(--green); border-color: var(--green); }
  .dl-checkbox:checked::after { content: ''; position: absolute; left: 4px; top: 1px; width: 8px; height: 5px; border-left: 2px solid #fff; border-bottom: 2px solid #fff; transform: rotate(-45deg); }
  .dl-date-col { flex-shrink: 0; min-width: 90px; }
  .dl-date { font-size: 13px; font-weight: 600; color: var(--blue-dark); }
  .dl-countdown { font-size: 11px; margin-top: 3px; padding: 2px 7px; border-radius: 99px; display: inline-block; }
  .countdown-red { background: var(--red-light); color: var(--red); }
  .countdown-amber { background: var(--amber-light); color: var(--amber); }
  .countdown-gray { background: var(--gray-light); color: var(--gray); }
  .dl-body { flex: 1; min-width: 0; }
  .dl-top { display: flex; align-items: flex-start; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
  .dl-task { font-size: 14px; font-weight: 500; color: var(--text); }
  .cat-badge { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 99px; white-space: nowrap; flex-shrink: 0; }
  .dl-owner { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
  .dl-desc { font-size: 13px; color: var(--text-muted); line-height: 1.5; margin-bottom: 8px; }
  .notes-area { display: flex; gap: 8px; align-items: flex-start; }
  .notes-input { flex: 1; font-size: 13px; border: 1px solid var(--border); border-radius: var(--radius); padding: 7px 10px; resize: none; min-height: 36px; color: var(--text); background: var(--bg); font-family: inherit; }
  .notes-input:focus { outline: none; border-color: var(--blue-mid); background: #fff; }
  .notes-input::placeholder { color: #B0B8C4; }
  .save-btn { font-size: 12px; padding: 7px 14px; background: var(--blue-dark); color: #fff; border: none; border-radius: var(--radius); cursor: pointer; white-space: nowrap; font-family: inherit; }
  .save-btn:hover { background: var(--blue-mid); } .save-btn:disabled { background: #B0B8C4; cursor: not-allowed; }
  .notes-meta { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .saved-indicator { color: var(--green); }
  .dl-meta-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 6px; }
  .completed-by { font-size: 11px; color: var(--green); font-weight: 500; }
  .cat-surveys { background: var(--teal-light); color: var(--teal); }
  .cat-milestones { background: var(--purple-light); color: var(--purple); }
  .cat-ads { background: var(--blue-light); color: var(--blue-dark); }
  .cat-evaluation { background: var(--amber-light); color: var(--amber); }
  .cat-recruitment { background: #EAF3DE; color: #3B6D11; }
  .cat-accreditation { background: var(--red-light); color: var(--red); }
  .cat-custom { background: var(--gray-light); color: var(--gray); }
  .sync-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
  .sync-live { background: var(--green); } .sync-connecting { background: var(--amber); }
  .sync-label { font-size: 12px; color: rgba(255,255,255,0.7); }
  .empty-state { text-align: center; padding: 40px; color: var(--text-muted); font-size: 14px; }
  .add-btn { margin-left: auto; padding: 6px 16px; background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.3); border-radius: var(--radius); font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; white-space: nowrap; flex-shrink: 0; }
  .add-btn:hover { background: rgba(255,255,255,0.25); }
  .add-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; z-index: 999; }
  .add-modal-overlay.hidden { display: none; }
  .add-modal { background: var(--surface); border-radius: var(--radius-lg); padding: 24px 28px; max-width: 500px; width: 92%; }
  .add-modal h2 { font-size: 17px; color: var(--blue-dark); margin-bottom: 16px; }
  .form-row { margin-bottom: 12px; }
  .form-row label { display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
  .form-row input, .form-row select, .form-row textarea { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; font-family: inherit; color: var(--text); background: var(--bg); }
  .form-row input:focus, .form-row select:focus, .form-row textarea:focus { outline: none; border-color: var(--blue-mid); background: #fff; }
  .form-row textarea { resize: vertical; min-height: 60px; }
  .form-date-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  .form-btn { padding: 8px 18px; border-radius: var(--radius); border: none; font-size: 13px; font-family: inherit; cursor: pointer; font-weight: 500; }
  .form-btn-primary { background: var(--blue-dark); color: #fff; }
  .form-btn-primary:hover { background: var(--blue-mid); }
  .form-btn-secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
  .custom-badge { font-size: 10px; background: #E6F1FB; color: var(--blue-dark); border-radius: 3px; padding: 1px 5px; margin-left: 4px; vertical-align: middle; }
  .delete-btn { font-size: 11px; color: var(--text-muted); background: none; border: none; cursor: pointer; padding: 2px 6px; border-radius: 4px; margin-left: 4px; }
  .delete-btn:hover { background: var(--red-light); color: var(--red); }
</style>
</head>
<body>
<div class="topbar">
  <div>
    <div class="topbar-title">ADM Fellowship — ACGME Deadline Dashboard</div>
    <div class="topbar-sub">Ventura County Medical Center  |  AY 2025–2026</div>
  </div>
  <div class="role-selector">
    <span id="sync-indicator"><span class="sync-dot sync-connecting"></span><span class="sync-label">Connecting...</span></span>
      
    <label for="roleSelect">Role:</label>
    <select id="roleSelect" onchange="setRole(this.value)">
      <option value="PD">Program Director</option>
      <option value="APD">Associate PD</option>
      <option value="MedEd">MedEd Staff</option>
    </select>
    <button class="add-btn" onclick="showAddModal()">+ Add deadline</button>
  </div>
</div>
<div class="add-modal-overlay hidden" id="addModal">
  <div class="add-modal">
    <h2>Add a deadline</h2>
    <div class="form-row"><label>Title</label><input id="add-label" type="text" placeholder="e.g. New fellow onboarding paperwork"></div>
    <div class="form-date-row">
      <div class="form-row"><label>Month</label><select id="add-month"><option value="1">January</option><option value="2">February</option><option value="3">March</option><option value="4">April</option><option value="5">May</option><option value="6">June</option><option value="7">July</option><option value="8">August</option><option value="9">September</option><option value="10">October</option><option value="11">November</option><option value="12">December</option></select></div>
      <div class="form-row"><label>Day</label><input id="add-day" type="number" min="1" max="31" placeholder="15"></div>
    </div>
    <div class="form-row"><label>Category</label><select id="add-category"><option value="ads|ADS Update">ADS Update</option><option value="milestones|Milestones / CCC">Milestones / CCC</option><option value="surveys|Surveys">Surveys</option><option value="evaluation|Program Evaluation">Program Evaluation</option><option value="recruitment|Recruitment">Recruitment</option><option value="accreditation|Accreditation">Accreditation</option><option value="custom|Custom">Custom</option></select></div>
    <div class="form-row"><label>Owner</label><input id="add-owner" type="text" placeholder="e.g. MedEd Staff, PD, APD"></div>
    <div class="form-row"><label>Description (optional)</label><textarea id="add-desc" placeholder="Brief description..."></textarea></div>
    <div class="form-actions">
      <button class="form-btn form-btn-secondary" onclick="hideAddModal()">Cancel</button>
      <button class="form-btn form-btn-primary" onclick="submitAddDeadline()">Add deadline</button>
    </div>
  </div>
</div>
<div class="main">
  <div class="stats">
    <div class="stat-card"><div class="stat-label">Total deadlines</div><div class="stat-num" id="stat-total">22</div></div>
    <div class="stat-card"><div class="stat-label">Completed</div><div class="stat-num green" id="stat-done">0</div></div>
    <div class="stat-card"><div class="stat-label">Due within 30 days</div><div class="stat-num amber" id="stat-soon">0</div></div>
    <div class="stat-card"><div class="stat-label">Overdue</div><div class="stat-num red" id="stat-overdue">0</div></div>
    <div class="stat-card"><div class="stat-label">With notes</div><div class="stat-num" id="stat-noted" style="color:var(--blue-mid)">0</div></div>
  </div>
  <div class="filters">
    <span class="filter-label">Filter:</span>
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('surveys',this)">Surveys</button>
    <button class="filter-btn" onclick="setFilter('milestones',this)">Milestones / CCC</button>
    <button class="filter-btn" onclick="setFilter('ads',this)">ADS Updates</button>
    <button class="filter-btn" onclick="setFilter('evaluation',this)">Program Evaluation</button>
    <button class="filter-btn" onclick="setFilter('recruitment',this)">Recruitment</button>
    <button class="filter-btn" onclick="setFilter('accreditation',this)">Accreditation</button>
    <button class="filter-btn" onclick="setFilter('pending',this)">Pending only</button>
  </div>
  <div id="deadline-list"></div>
</div>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getFirestore, doc, setDoc, deleteDoc, onSnapshot, collection } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
const FIREBASE_CONFIG={apiKey:"AIzaSyA2V4uwgE6vTbVPKo26CaXivsdugvSloeA",authDomain:"adm-fellowship.firebaseapp.com",projectId:"adm-fellowship",storageBucket:"adm-fellowship.appspot.com",messagingSenderId:"259378002634",appId:"1:259378002634:web:88a28d65c388ede4315233"};
const DEADLINES=[{id:"jan-roster",month:1,day:1,label:"Update Fellow & Faculty Rosters in ADS",category:"ads",catLabel:"ADS Update",owner:"MedEd Staff",desc:"Ensure rosters are current before surveys open in February."},{id:"feb-surveys-open",month:2,day:9,label:"Resident/Fellow & Faculty Surveys open",category:"surveys",catLabel:"Surveys",owner:"PD / APD",desc:"Annual ACGME surveys open Feb 9. Notify all trainees and faculty. Surveys close April 10."},{id:"feb-ccc",month:2,day:15,label:"Mid-year CCC meeting",category:"milestones",catLabel:"Milestones / CCC",owner:"PD / APD",desc:"Clinical Competency Committee meets to review mid-year trainee performance."},{id:"mar-milestones-open",month:3,day:15,label:"Mid-year Milestones submission window opens",category:"milestones",catLabel:"Milestones / CCC",owner:"MedEd Staff",desc:"Semi-annual milestones reporting period opens. Submit via ADS."},{id:"apr-surveys-close",month:4,day:10,label:"Resident/Fellow & Faculty Surveys close",category:"surveys",catLabel:"Surveys",owner:"PD / APD",desc:"Confirm participation threshold met. Aim for 70% response rate."},{id:"apr-milestones-due",month:4,day:15,label:"Mid-year Milestones submission deadline",category:"milestones",catLabel:"Milestones / CCC",owner:"MedEd Staff",desc:"Typical spring window closes mid-April. Confirm exact date in ADS."},{id:"may-eras-open",month:5,day:1,label:"ERAS fellowship application cycle opens",category:"recruitment",catLabel:"Recruitment",owner:"MedEd Staff",desc:"Programs register and update program information in ERAS."},{id:"jun-milestones-close",month:6,day:27,label:"Spring Milestones reporting window closes",category:"milestones",catLabel:"Milestones / CCC",owner:"MedEd Staff",desc:"Final deadline for spring milestones window. Verify in ADS."},{id:"jun-credentials",month:6,day:30,label:"Program director credentials - annual verification",category:"accreditation",catLabel:"Accreditation",owner:"PD",desc:"Verify PD board certification, faculty credentials, and duty hour compliance."},{id:"jul-onboard",month:7,day:1,label:"New academic year begins - fellow onboarding",category:"ads",catLabel:"ADS Update",owner:"MedEd Staff",desc:"Add incoming fellows to ADS. New fellows eligible for milestones after 60 days."},{id:"jul-eras-apps",month:7,day:2,label:"ERAS applications available to programs",category:"recruitment",catLabel:"Recruitment",owner:"PD / APD",desc:"Fellowship applicants begin applying through ERAS."},{id:"jul-ads-open",month:7,day:15,label:"ADS Annual Update - program info window opens",category:"ads",catLabel:"ADS Update",owner:"MedEd Staff",desc:"ADS Annual Update collection begins July-September."},{id:"aug-interviews",month:8,day:1,label:"Interview season begins",category:"recruitment",catLabel:"Recruitment",owner:"PD / APD",desc:"Conduct fellowship interviews August-October for NRMP Match."},{id:"sep-ape",month:9,day:30,label:"Annual Program Evaluation (APE) submission",category:"evaluation",catLabel:"Program Evaluation",owner:"PD / APD",desc:"PEC conducts APE and submits materials."},{id:"sep-ads-due",month:9,day:30,label:"ADS Annual Update - program information due",category:"ads",catLabel:"ADS Update",owner:"MedEd Staff",desc:"Deadline for all program-level ADS Annual Update fields."},{id:"oct-pec",month:10,day:15,label:"Program Evaluation Committee (PEC) annual meeting",category:"evaluation",catLabel:"Program Evaluation",owner:"PD / APD",desc:"PEC meets at least annually. Document meeting and improvement plan."},{id:"nov-rank",month:11,day:1,label:"NRMP rank order list opens",category:"recruitment",catLabel:"Recruitment",owner:"PD / APD",desc:"Programs enter rank order lists for Medicine and Pediatrics Match."},{id:"nov-ccc",month:11,day:15,label:"Year-end CCC meeting",category:"milestones",catLabel:"Milestones / CCC",owner:"PD / APD",desc:"Annual CCC meeting to review fellow performance and advancement."},{id:"nov-milestones-open",month:11,day:15,label:"Fall Milestones submission window opens",category:"milestones",catLabel:"Milestones / CCC",owner:"MedEd Staff",desc:"Second semi-annual milestones reporting period opens."},{id:"dec-match",month:12,day:1,label:"NRMP Match Day - fellowship appointments",category:"recruitment",catLabel:"Recruitment",owner:"MedEd Staff",desc:"Match results released. Begin appointment paperwork."},{id:"dec-selfstudy",month:12,day:31,label:"Self-Study annual update (if cycle active)",category:"accreditation",catLabel:"Accreditation",owner:"PD",desc:"Integrate APE outcomes into Self-Study documentation."},{id:"jan-milestones-due",month:1,day:15,label:"Fall Milestones submission deadline",category:"milestones",catLabel:"Milestones / CCC",owner:"MedEd Staff",desc:"Typical winter window closes mid-January. Confirm in ADS."}];
const CAT={surveys:"cat-surveys",milestones:"cat-milestones",ads:"cat-ads",evaluation:"cat-evaluation",recruitment:"cat-recruitment",accreditation:"cat-accreditation",custom:"cat-custom"};
let state={},custom=[],filter='all',role='PD',db=null;
function today(){const t=new Date();return new Date(t.getFullYear(),t.getMonth(),t.getDate());}
function next(m,d){const t=today();let dt=new Date(t.getFullYear(),m-1,d);if(dt<t)dt=new Date(t.getFullYear()+1,m-1,d);return dt;}
function days(m,d){return Math.round((next(m,d)-today())/86400000);}
function badge(n){if(n<0)return`<span class="dl-countdown countdown-red">Overdue ${Math.abs(n)}d</span>`;if(n===0)return'<span class="dl-countdown countdown-red">Today</span>';if(n<=14)return`<span class="dl-countdown countdown-red">In ${n}d</span>`;if(n<=60)return`<span class="dl-countdown countdown-amber">In ${n}d</span>`;return`<span class="dl-countdown countdown-gray">In ${n}d</span>`;}
function fmt(m,d){return['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m-1]+' '+d;}
function saveLocal(){try{localStorage.setItem('adm_s',JSON.stringify(state));}catch(e){}}
function loadLocal(){try{const s=localStorage.getItem('adm_s');if(s)state=JSON.parse(s);}catch(e){}}
async function toFB(id,data){if(!db)return;try{await setDoc(doc(db,'deadlines',id),data,{merge:true});}catch(e){}}
function init(){
  loadLocal();renderList();
  try{
    const app=initializeApp(FIREBASE_CONFIG);db=getFirestore(app);
    onSnapshot(collection(db,'deadlines'),(snap)=>{snap.forEach(ds=>{state[ds.id]=ds.data();});saveLocal();renderList();});
    onSnapshot(collection(db,'custom_deadlines'),(snap)=>{custom=snap.docs.map(d=>({...d.data()}));renderList();});
    document.getElementById('sync-indicator').innerHTML='<span class="sync-dot sync-live"></span><span class="sync-label">Live sync</span>';
  }catch(e){document.getElementById('sync-indicator').innerHTML='<span class="sync-dot sync-connecting"></span><span class="sync-label">Offline</span>';}
}
window.setRole=r=>{role=r;};
window.setFilter=(f,btn)=>{filter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderList();};
window.toggleComplete=async id=>{const s=state[id]||{};const was=s.completed||false;const nd={...s,completed:!was,completedBy:!was?role:null,completedAt:!was?new Date().toISOString():null};state[id]=nd;saveLocal();await toFB(id,nd);renderList();};
window.saveNote=async id=>{const inp=document.getElementById('note-'+id);if(!inp)return;const btn=document.getElementById('nb-'+id);if(btn){btn.disabled=true;btn.textContent='Saving...';}const note=inp.value.trim();const s=state[id]||{};const nd={...s,note,noteBy:role,noteAt:new Date().toISOString()};state[id]=nd;saveLocal();await toFB(id,nd);if(btn){btn.disabled=false;btn.textContent='Save';}const meta=document.getElementById('nm-'+id);if(meta)meta.innerHTML=`<span class="saved-indicator">Saved by ${role}</span> - ${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;};
window.showAddModal=()=>{document.getElementById('addModal').classList.remove('hidden');document.getElementById('add-label').focus();};
window.hideAddModal=()=>{document.getElementById('addModal').classList.add('hidden');['add-label','add-day','add-owner','add-desc'].forEach(id=>document.getElementById(id).value='');};
window.submitAddDeadline=async()=>{const label=document.getElementById('add-label').value.trim();const month=parseInt(document.getElementById('add-month').value);const day=parseInt(document.getElementById('add-day').value);const cv=document.getElementById('add-category').value.split('|');const owner=document.getElementById('add-owner').value.trim()||role;const desc=document.getElementById('add-desc').value.trim();if(!label){alert('Please enter a title.');return;}if(!day||day<1||day>31){alert('Please enter a valid day.');return;}const id='custom-'+Date.now();const entry={id,label,month,day,category:cv[0],catLabel:cv[1],owner,desc,custom:true,createdBy:role,createdAt:new Date().toISOString()};if(db){await setDoc(doc(db,'custom_deadlines',id),entry);}else{custom.push(entry);renderList();}hideAddModal();};
window.deleteCustom=async id=>{if(!confirm('Remove this deadline?'))return;if(db){await deleteDoc(doc(db,'custom_deadlines',id));}else{custom=custom.filter(d=>d.id!==id);renderList();}};
function updateStats(){let done=0,soon=0,over=0,noted=0;[...DEADLINES,...custom].forEach(d=>{const s=state[d.id]||{};if(s.completed)done++;if(s.note)noted++;const n=days(d.month,d.day);if(!s.completed&&n<0)over++;else if(!s.completed&&n>=0&&n<=30)soon++;});document.getElementById('stat-total').textContent=DEADLINES.length+custom.length;document.getElementById('stat-done').textContent=done;document.getElementById('stat-soon').textContent=soon;document.getElementById('stat-overdue').textContent=over;document.getElementById('stat-noted').textContent=noted;}
function renderList(){updateStats();const all=[...DEADLINES,...custom].map(d=>({...d,n:days(d.month,d.day)})).sort((a,b)=>a.n-b.n);const fil=all.filter(d=>{if(filter==='all')return true;if(filter==='pending')return!(state[d.id]||{}).completed;return d.category===filter;});if(!fil.length){document.getElementById('deadline-list').innerHTML='<div class="empty-state">No deadlines match this filter.</div>';return;}const groups=[{label:'Overdue',items:fil.filter(d=>d.n<0)},{label:'Due within 30 days',items:fil.filter(d=>d.n>=0&&d.n<=30)},{label:'Upcoming (31-90 days)',items:fil.filter(d=>d.n>30&&d.n<=90)},{label:'Later this year',items:fil.filter(d=>d.n>90)}];let html='';groups.forEach(g=>{if(!g.items.length)return;html+=`<div class="section-header">${g.label} (${g.items.length})</div>`;g.items.forEach(d=>{const s=state[d.id]||{};const ic=s.completed||false;const note=s.note||'';const nb=s.noteBy||'';const na=s.noteAt?new Date(s.noteAt).toLocaleDateString('en-US',{month:'short',day:'numeric'}):'';html+=`<div class="deadline-card ${ic?'completed':''}" id="card-${d.id}"><div class="dl-check-col"><input type="checkbox" class="dl-checkbox" ${ic?'checked':''} onchange="toggleComplete('${d.id}')"></div><div class="dl-date-col"><div class="dl-date">${fmt(d.month,d.day)}</div>${badge(d.n)}</div><div class="dl-body"><div class="dl-top"><span class="cat-badge ${CAT[d.category]||'cat-custom'}">${d.catLabel}</span></div><div class="dl-task">${d.label}${d.custom?'<span class="custom-badge">Custom</span>':''}${d.custom?`<button class="delete-btn" onclick="deleteCustom('${d.id}')">x</button>`:''}</div><div class="dl-owner">Owner: ${d.owner}</div><div class="dl-desc">${d.desc||''}</div>${ic&&s.completedBy?`<div class="dl-meta-row"><span class="completed-by">Completed by ${s.completedBy}${s.completedAt?' - '+new Date(s.completedAt).toLocaleDateString('en-US',{month:'short',day:'numeric'}):''}</span></div>`:''}<div class="notes-area"><textarea class="notes-input" id="note-${d.id}" rows="1" placeholder="Add a note (visible to all stakeholders)...">${note}</textarea><button class="save-btn" id="nb-${d.id}" onclick="saveNote('${d.id}')">Save</button></div>${note?`<div class="notes-meta" id="nm-${d.id}">Last updated by ${nb}${na?' - '+na:''}</div>`:`<div class="notes-meta" id="nm-${d.id}"></div>`}</div></div>`;});});document.getElementById('deadline-list').innerHTML=html;document.querySelectorAll('.notes-input').forEach(ta=>{ta.style.height='auto';ta.style.height=Math.max(36,ta.scrollHeight)+'px';ta.addEventListener('input',()=>{ta.style.height='auto';ta.style.height=Math.max(36,ta.scrollHeight)+'px';});});}
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
